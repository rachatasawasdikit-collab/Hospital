<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบยืม-คืนอุปกรณ์กายภาพบำบัด</title>
<style>
  :root {
    --blue-50: #E6F1FB;
    --blue-100: #B5D4F4;
    --blue-600: #185FA5;
    --blue-800: #0C447C;
    --blue-900: #042C53;
    --teal-50: #E1F5EE;
    --teal-600: #0F6E56;
    --green-50: #EAF3DE;
    --green-600: #3B6D11;
    --amber-50: #FAEEDA;
    --amber-600: #854F0B;
    --red-50: #FCEBEB;
    --red-600: #A32D2D;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #f0f4f8; color: #1a2636; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');

  header { background: var(--blue-900); color: #fff; padding: 18px 32px; border-bottom: 3px solid var(--blue-600); }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 20px; }
  .header-title h1 { font-size: 18px; font-weight: 600; }
  .header-title p { font-size: 13px; color: var(--blue-100); }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 32px; }
  .grid-2 { display: grid; grid-template-columns: 35% 65%; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }

  .stat-card { background: #fff; border: 1px solid var(--gray-100); border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .stat-label { font-size: 12px; color: var(--gray-600); margin-bottom: 6px; font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 600; color: var(--blue-800); }
  .stat-sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; }

  .card { background: #fff; border: 1px solid var(--gray-100); border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card-title { font-size: 15px; font-weight: 600; color: var(--blue-900); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-100); }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-800); margin-bottom: 6px; }
  .form-control { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-100); border-radius: 7px; font-size: 14px; }
  .form-control[readonly] { background: var(--gray-50); color: var(--gray-600); cursor: not-allowed; }
  
  .equip-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .equip-card { border: 2px solid var(--gray-100); border-radius: 10px; padding: 14px 16px; cursor: pointer; background: #fff; }
  .equip-card:hover, .equip-card.selected { border-color: var(--blue-600); background: var(--blue-50); }
  .equip-name { font-size: 14px; font-weight: 600; color: var(--blue-900); }
  .equip-id { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

  .btn { padding: 12px 24px; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
  .btn-primary { background: var(--blue-800); color: #fff; }
  
  /* Loading Overlay */
  #loading { text-align: center; padding: 20px; color: var(--blue-600); font-weight: 500; }
</style>
</head>
<body>

<script type="text/javascript">var submitted=false;</script>
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { handleFormSuccess(); }"></iframe>

<header>
  <div class="header-inner">
    <div class="header-title">
      <h1>ระบบยืมอุปกรณ์กายภาพบำบัด</h1>
      <p>ระบบดึงยอดคงเหลืออัตโนมัติจาก Google Sheets</p>
    </div>
  </div>
</header>

<div class="main">

  <div class="grid-3">
    <div class="stat-card">
      <div class="stat-label">อุปกรณ์ทั้งหมดในระบบ</div>
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-sub">รายการทั้งหมด</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">พร้อมให้ยืมตอนนี้</div>
      <div class="stat-value" id="statAvail" style="color: var(--teal-600)">กำลังโหลด...</div>
      <div class="stat-sub">ชิ้น (หักอันที่ถูกยืมออกแล้ว)</div>
    </div>
  </div>

  <div class="grid-2">
    
    <div class="card">
      <div class="card-title">1. เลือกอุปกรณ์ที่ต้องการยืม</div>
      <div id="loading">🔄 กำลังเช็กสถานะจาก Google Sheets...</div>
      <div class="equip-grid" id="equipGrid" style="display: none;"></div>
    </div>

    <div class="card">
      <div class="card-title">2. รายละเอียดการยืม</div>
      
      <form 
        action="https://docs.google.com/forms/d/e/1FAIpQLScML4Swyq6YXpgOb3EAIynnRv1MgmlvjqeiVwvlOIl3uPiTOQ/formResponse" 
        method="POST" 
        target="hidden_iframe" 
        onsubmit="submitted=true;">
        
        <div class="form-group">
          <label>ชื่ออุปกรณ์</label>
          <input type="text" name="entry.1032778738" id="formEquipName" class="form-control" readonly placeholder="← คลิกเลือกอุปกรณ์จากฝั่งซ้าย" required />
        </div>
        <div class="form-group">
          <label>รหัสอุปกรณ์</label>
          <input type="text" name="entry.1446978004" id="formEquipId" class="form-control" readonly placeholder="รหัสอุปกรณ์" required />
        </div>
        <div class="form-group">
          <label>ชื่อ-นามสกุล ผู้ยืม</label>
          <input type="text" name="entry.1552220074" id="borrowerName" class="form-control" placeholder="กรอกชื่อผู้ยืม" required />
        </div>
        <div class="form-group">
          <label>แผนก/หน่วยงาน</label>
          <input type="text" name="entry.1232626550" id="department" class="form-control" placeholder="เช่น กายภาพบำบัด" required />
        </div>
        <div class="form-group">
          <label>เบอร์โทรศัพท์</label>
          <input type="text" name="entry.1243273208" id="phone" class="form-control" placeholder="เบอร์โทรติดต่อ" required />
        </div>
        <div class="form-group">
          <label>วันที่ยืม</label>
          <input type="date" name="entry.119926767" id="borrowDate" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-primary">บันทึกข้อมูลการยืม</button>
      </form>
    </div>

  </div>
</div>

<script>
// ⚠️ 1. นำลิงก์ Web App URL จาก Google Apps Script (ที่สอนทำในขั้นตอนที่แล้ว) มาวางที่นี่
const API_URL = "https://script.google.com/macros/s/XXXXXX/exec"; 

// 2. รายการอุปกรณ์ทั้งหมดในแผนกของคุณ (ใส่รหัสและชื่อให้ตรงกับหน้างานจริง)
let equipments = [
  { id: 'PT-001', name: 'เครื่อง TENS (กระตุ้นไฟฟ้า)', status: 'available' },
  { id: 'PT-002', name: 'เครื่อง Ultrasound Therapy', status: 'available' },
  { id: 'PT-003', name: 'เครื่อง Infrared Lamp', status: 'available' },
  { id: 'PT-004', name: 'ไม้เท้า 4 ขา (Quad Cane)', status: 'available' },
  { id: 'PT-005', name: 'Walker มาตรฐาน', status: 'available' },
  { id: 'PT-006', name: 'ไม้ค้ำยัน (Axillary Crutch)', status: 'available' }
];

let selectedEquipId = null;

// 🔄 ฟังก์ชันหลัก: วิ่งไปดึงข้อมูลจาก Sheets มาคำนวณยอดคงเหลือ
async function pullDataFromGoogleSheets() {
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('ดึงข้อมูลไม่สำเร็จ');
    const logs = await response.json();
    
    // สร้างที่เก็บสถานะล่าสุดของแต่ละรหัสอุปกรณ์
    let latestStatus = {};
    logs.forEach(item => {
      if(item.equipId) {
        latestStatus[item.equipId.trim()] = item.status.trim(); // ดูว่ารายการล่าสุดคือ "ยืม" หรือ "คืน"
      }
    });
    
    // เอาสถานะล่าสุดจากในชีต มาอัปเดตใส่อุปกรณ์หลักในเว็บ
    equipments.forEach(equip => {
      if (latestStatus[equip.id] === "ยืม") {
        equip.status = 'borrowed'; // ปรับเป็นถูกยืมไปแล้ว
      } else {
        equip.status = 'available'; // ว่างพร้อมให้ยืม
      }
    });
    
    // โหลดข้อมูลเสร็จแล้ว ให้แสดงผลบนหน้าจอ
    document.getElementById('loading').style.display = 'none';
    document.getElementById('equipGrid').style.display = 'grid';
    
    updateInterface();
    
  } catch (error) {
    console.error("เชื่อมต่อ API ไม่สำเร็จ:", error);
    // ถ้าดึงสิทธิ์ไม่ได้ (เช่น ลืมล็อกอินอีเมลองค์กร) ให้แสดงข้อมูลตั้งต้นไปก่อนเพื่อให้ระบบไม่ค้าง
    document.getElementById('loading').innerHTML = "⚠️ แสดงผลโหมดออฟไลน์ (เชื่อมต่อชีตไม่ได้)";
    document.getElementById('equipGrid').style.display = 'grid';
    updateInterface();
  }
}

// ฟังก์ชันอัปเดตหน้าตาเว็บและตัวเลขสถิติ
function updateInterface() {
  // 1. อัปเดตตัวเลขสถิติด้านบน
  document.getElementById('statTotal').textContent = equipments.length;
  const availableItems = equipments.filter(e => e.status === 'available');
  document.getElementById('statAvail').textContent = availableItems.length;

  // 2. วาดรายการอุปกรณ์ฝั่งซ้าย (กรองเอาเฉพาะชิ้นที่ว่างอยู่จริงขึ้นมาแสดง)
  const grid = document.getElementById('equipGrid');
  if (availableItems.length === 0) {
    grid.innerHTML = '<div style="color:var(--gray-400);text-align:center;padding:20px 0;">ขณะนี้อุปกรณ์ทุกชิ้นถูกยืมหมดแล้ว</div>';
    return;
  }
  
  grid.innerHTML = availableItems.map(e => `
    <div class="equip-card${e.id === selectedEquipId ? ' selected' : ''}" onclick="selectEquipment('${e.id}')">
      <div class="equip-name">${e.name}</div>
      <div class="equip-id">รหัสอุปกรณ์: ${e.id}</div>
    </div>
  `).join('');
}

// ฟังก์ชันทำงานตอนคลิกเลือกอุปกรณ์
function selectEquipment(id) {
  selectedEquipId = id;
  const equip = equipments.find(e => e.id === id);
  document.getElementById('formEquipName').value = equip.name;
  document.getElementById('formEquipId').value = equip.id;
  updateInterface(); // ไฮไลท์การเลือก
}

// ฟังก์ชันเมื่อกดบันทึกยืมและข้อมูลยิงเข้า Google Form สำเร็จ
function handleFormSuccess() {
  if (!submitted) return;
  alert('🎉 บันทึกการยืมสำเร็จ! ข้อมูลถูกส่งเข้า Google Sheets เรียบร้อยแล้ว');
  
  // รีเฟรชหน้าเว็บดึงยอดใหม่ทันทีหลังกดตกลง
  location.reload();
}

// ทำงานตอนเปิดหน้าเว็บขึ้นมาครั้งแรก
window.onload = function() {
  document.getElementById('borrowDate').valueAsDate = new Date(); // ใส่ใส่วันที่ปัจจุบันให้ในช่อง
  pullDataFromGoogleSheets(); // สั่งดึง API รอบเดียวตอนโหลดหน้าเว็บ
};
</script>
</body>
</html>
